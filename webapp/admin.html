<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Админ панель</h2>

<h3>Предметы</h3>

<input id="subjectName" placeholder="Название предмета">

<button onclick="addSubject()">Создать</button>

<div id="subjects"></div>

<h3>Рассылка</h3>

<input id="text">

<button onclick="broadcast()">Отправить</button>

<script>

async function loadSubjects(){

 const res = await fetch("/api/subjects")

 const subjects = await res.json()

 const container = document.getElementById("subjects")

 container.innerHTML=""

 subjects.forEach(sub=>{

  const div=document.createElement("div")

  div.innerHTML=sub+" <button onclick='deleteSubject(\""+sub+"\")'>Удалить</button>"

  container.appendChild(div)

 })

}

async function addSubject(){

 const name=document.getElementById("subjectName").value

 await fetch("/api/addSubject",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name})
 })

 loadSubjects()

}

async function deleteSubject(name){

 await fetch("/api/deleteSubject",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name})
 })

 loadSubjects()

}

async function broadcast(){

 const text=document.getElementById("text").value

 await fetch("/api/broadcast",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text})
 })

 alert("Отправлено")

}

loadSubjects()

</script>

</body>
</html>
