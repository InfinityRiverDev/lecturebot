<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Админ панель</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
 font-family:Arial;
 background:#020617;
 color:white;
 padding:20px;
}

button{
 padding:10px 20px;
 margin:5px;
 border:none;
 border-radius:8px;
 background:#dc2626;
 color:white;
 cursor:pointer;
}

input{
 padding:10px;
 margin:5px;
}
</style>
</head>

<body>

<h2>👑 Админ панель</h2>

<h3>Создать предмет</h3>

<input id="subjectName" placeholder="Название предмета">

<button onclick="addSubject()">Создать</button>

<h3>Список предметов</h3>

<div id="subjects"></div>

<script>

async function loadSubjects(){

 const res = await fetch("/api/subjects")

 const subjects = await res.json()

 const container = document.getElementById("subjects")

 container.innerHTML=""

 subjects.forEach(subject=>{

  const div=document.createElement("div")

  div.innerHTML=`
   ${subject}
   <button onclick="deleteSubject('${subject}')">Удалить</button>
  `

  container.appendChild(div)

 })

}

async function addSubject(){

 const name=document.getElementById("subjectName").value

 await fetch("/api/addSubject",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({name})
 })

 loadSubjects()

}

async function deleteSubject(name){

 await fetch("/api/deleteSubject",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({name})
 })

 loadSubjects()

}

loadSubjects()

</script>

</body>
</html>
