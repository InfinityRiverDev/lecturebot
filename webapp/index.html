<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>KSTU Lectures</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
 font-family: Arial;
 padding:20px;
 background:#f4f4f4;
}

.card{
 background:white;
 padding:20px;
 border-radius:10px;
 box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="card">

<h2>Mini App KSTU</h2>

<div id="user"></div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe?.user

if(!user){

 document.body.innerHTML="Откройте приложение через Telegram"
 throw new Error("No Telegram user")

}

async function loadUser(){

 const response = await fetch("/api/me",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   id:user.id
  })
 })

 const data = await response.json()

 renderApp(data)

}

function renderApp(data){

 const container = document.getElementById("user")

 if(data.role === "admin"){

  container.innerHTML = `
  <h2>Админ панель</h2>
  <p>Вы вошли как администратор</p>
  `

 }else{

  container.innerHTML = `
  <h2>Лекции</h2>
  <p>Добро пожаловать ${user.first_name}</p>
  `

 }

}

loadUser()

</script>

</body>
</html>
