<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>KSTU Lectures</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
 font-family: Arial;
 padding:20px;
 background:#f4f4f4;
}

.card{
 background:white;
 padding:20px;
 border-radius:10px;
 box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="card">

<h2>Mini App KSTU</h2>

<div id="user"></div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe?.user

if(!user){

 document.body.innerHTML="Откройте приложение через Telegram"
 throw new Error("No Telegram user")

}

async function loadUser(){

 const response = await fetch("/api/me",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   id:user.id
  })
 })

 const data = await response.json()

 renderApp(data)

}

async function renderApp(data){

 const container = document.getElementById("user")

 if(data.role === "admin"){

    container.innerHTML = `
        <h2>⚙ Админ панель</h2>

        <button onclick="loadSubjects()">📚 Предметы</button>
        <br><br>

        <button onclick="showCreateSubject()">➕ Создать предмет</button>
        <br><br>

        <button onclick="showUploadLecture()">🎤 Добавить лекцию</button>
        `

    }else{

  container.innerHTML = `
  <h2>Лекции</h2>
  <button onclick="loadSubjects()">📚 Открыть предметы</button>
  `

 }

}

function showCreateSubject(){

 const container = document.getElementById("user")

 container.innerHTML = `

 <h2>➕ Новый предмет</h2>

 <input 
  id="subjectName"
  placeholder="Название предмета"
  style="padding:10px;width:100%;margin-bottom:10px"
 />

 <button onclick="createSubject()">Создать</button>

 <br><br>

 <button onclick="loadSubjects()">⬅ Назад</button>

 `

}

async function createSubject(){

 const subject = document.getElementById("subjectName").value

 if(!subject){
  alert("Введите название")
  return
 }

 await fetch("/api/create-subject",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({subject})
 })

 alert("Предмет создан")

 loadSubjects()

}

async function loadSubjects(){

 const res = await fetch("/api/subjects")
 const subjects = await res.json()

 const container = document.getElementById("user")

 if(subjects.length === 0){
  container.innerHTML = "<p>❌ Пока нет предметов</p>"
  return
 }

 let html = "<h2>📚 Предметы</h2>"

 subjects.forEach(s=>{

 html += `
 <div style="padding:12px;border:1px solid #ddd;margin:6px;border-radius:8px">

  <div onclick="openSubject('${s}')" style="cursor:pointer">
   📚 ${s}
  </div>

  <button onclick="deleteSubject('${s}')">
   🗑 Удалить
  </button>

 </div>
 `

})

 container.innerHTML = html

}

async function deleteSubject(subject){

 if(!confirm("Удалить предмет "+subject+" ?")){
  return
 }

 await fetch("/api/delete-subject",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({subject})
 })

 loadSubjects()

}

async function openSubject(subject){

 const res = await fetch(`/api/lectures/${subject}`)
 const lectures = await res.json()

 const container = document.getElementById("user")

 if(lectures.length === 0){

  container.innerHTML = `
  <h2>${subject}</h2>
  <p>❌ Пока нет лекций</p>
  <button onclick="loadSubjects()">⬅ Назад</button>
  `
  return
 }

 let html = `<h2>${subject}</h2>`

 lectures.forEach(l=>{

  html += `
  <div 
   style="padding:12px;border:1px solid #ddd;margin:6px;border-radius:8px"
  >
   <a href="/data/${subject}/${l}" target="_blank">
    📄 ${l.replace(".pdf","")}
   </a>
  </div>
  `

 })

 html += `<button onclick="loadSubjects()">⬅ Назад</button>`

 container.innerHTML = html

}

async function showUploadLecture(){

 const res = await fetch("/api/subjects")
 const subjects = await res.json()

 let options=""

 subjects.forEach(s=>{
  options += `<option value="${s}">${s}</option>`
 })

 const container = document.getElementById("user")

 container.innerHTML = `

 <h2>🎤 Загрузка лекции</h2>

 <label>Предмет</label>

 <select id="subjectInput" style="width:100%;padding:10px;margin-bottom:10px">
 ${options}
 </select>

 <label>Аудио файл</label>

 <input type="file" id="audioFile" style="margin-bottom:10px">

 <label>Обработка текста</label>

 <div>
  <label>
   <input type="radio" name="mode" value="raw" checked>
   Без AI
  </label>
 </div>

 <div>
  <label>
   <input type="radio" name="mode" value="ai">
   AI конспект
  </label>
 </div>

 <br>

 <button onclick="uploadLecture()">Загрузить</button>

 <br><br>

 <button onclick="loadSubjects()">⬅ Назад</button>

 `

}

async function uploadLecture(){

 const subject = document.getElementById("subjectInput").value
 const file = document.getElementById("audioFile").files[0]

 const mode = document.querySelector('input[name="mode"]:checked').value

 const form = new FormData()

 form.append("audio",file)
 form.append("subject",subject)
 form.append("mode",mode)

 await fetch("/api/upload-lecture",{
  method:"POST",
  body:form
 })

 alert("Лекция создана")

 loadSubjects()

}

loadUser()

</script>

</body>
</html>
