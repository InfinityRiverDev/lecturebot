<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>KSTU Lectures</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

:root{
 --radius:14px;
 --radius-small:10px;
 --border:1px solid rgba(0,0,0,0.08);
 --shadow:0 6px 20px rgba(0,0,0,0.06);
 --transition:0.18s ease;
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto,Arial;
 background:var(--tg-theme-bg-color,#f5f7fb);
 color:var(--tg-theme-text-color,#111);
 padding:20px;
 line-height:1.4;
}

.header{
 font-size:24px;
 font-weight:600;
 margin-bottom:18px;
 letter-spacing:-0.3px;
}

/* карточки */

.card{
 background:var(--tg-theme-secondary-bg-color,#fff);
 border-radius:var(--radius);
 padding:16px;
 margin-bottom:12px;
 border:var(--border);
 box-shadow:var(--shadow);
 transition:var(--transition);
}

.card:hover{
 transform:translateY(-2px);
 box-shadow:0 10px 26px rgba(0,0,0,0.08);
}

/* кнопки */

.button{
 width:100%;
 padding:13px;
 border:none;
 border-radius:12px;
 font-size:15px;
 font-weight:500;
 cursor:pointer;
 margin-bottom:10px;
 transition:var(--transition);
 background:var(--tg-theme-button-color,#2AABEE);
 color:var(--tg-theme-button-text-color,#fff);
}

.button:hover{
 transform:translateY(-1px);
 opacity:0.95;
}

.button:active{
 transform:scale(0.98);
}

.button.secondary{
 background:#eef1f6;
 color:#222;
}

/* inputs */

.input,
.select,
textarea{

 width:100%;
 padding:12px 14px;
 border-radius:var(--radius-small);
 border:1px solid rgba(0,0,0,0.08);
 background:#fff;

 font-size:14px;
 outline:none;

 transition:var(--transition);
 margin-bottom:10px;

}

.input:focus,
.select:focus,
textarea:focus{

 border:1px solid var(--tg-theme-button-color,#2AABEE);
 box-shadow:0 0 0 3px rgba(42,171,238,0.15);

}

/* textarea */

textarea{
 resize:vertical;
 min-height:120px;
 font-family:inherit;
}

/* ссылки */

a{
 text-decoration:none;
 color:var(--tg-theme-link-color,#2AABEE);
 font-weight:500;
}

/* small text */

.small{
 font-size:13px;
 opacity:0.6;
 margin-top:4px;
}

/* back button spacing */

.back{
 margin-top:14px;
}

/* радио кнопки */

label{
 font-size:14px;
 display:block;
 margin-bottom:6px;
 cursor:pointer;
}

/* файл */

input[type="file"]{
 margin-top:6px;
 margin-bottom:12px;
}

/* плавность всего */

*{
 box-sizing:border-box;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe?.user

if(!user){
 document.body.innerHTML="Откройте Mini App через Telegram"
 throw new Error("No Telegram user")
}

async function loadUser(){

 const response = await fetch("/api/me",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({id:user.id})
 })

 const data = await response.json()

 renderHome(data)

}

function renderHome(data){

 const app = document.getElementById("app")

 if(data.role === "admin"){

 app.innerHTML=`

 <div class="header">⚙ Админ панель</div>

 <button class="button" onclick="loadReports()">📊 Отчёты отметки</button>

 <button class="button" onclick="loadSubjects()">📚 Предметы</button>

 <button class="button" onclick="showCreateSubject()">➕ Создать предмет</button>

 <button class="button" onclick="showUploadLecture()">🎤 Добавить лекцию</button>

 <button class="button" onclick="showBroadcast()">📢 Рассылка</button>

 `

 }else{

 app.innerHTML=`

 <div class="header">📚 Лекции</div>

 <button class="button" onclick="loadSubjects()">Открыть предметы</button>

 `

 }

}

async function loadSubjects(){

 const res = await fetch("/api/subjects")
 const subjects = await res.json()

 const app = document.getElementById("app")

 let html=`<div class="header">📚 Предметы</div>`

 subjects.forEach(s=>{

 html+=`

 <div class="card">

 <div onclick="openSubject('${s}')" style="cursor:pointer">

 <b>${s}</b>

 </div>

 <button class="button secondary" onclick="deleteSubject('${s}')">Удалить</button>

 </div>

 `

 })

 html+=`<button class="button back" onclick="loadUser()">⬅ Назад</button>`

 app.innerHTML=html

}

async function openSubject(subject){

 const res = await fetch("/api/lectures/"+subject)
 const lectures = await res.json()

 const app = document.getElementById("app")

 let html=`<div class="header">${subject}</div>`

 lectures.forEach(l=>{

 html+=`

 <div class="card">

 <a href="/data/${subject}/${l}" target="_blank">

 📄 ${l.replace(".pdf","")}

 </a>

 </div>

 `

 })

 html+=`<button class="button back" onclick="loadSubjects()">⬅ Назад</button>`

 app.innerHTML=html

}

function showBroadcast(){

 const app=document.getElementById("app")

 app.innerHTML=`

 <div class="header">📢 Рассылка</div>

 <textarea id="broadcastText"
 style="width:100%;height:120px;padding:10px;border-radius:10px;border:1px solid #ddd"
 placeholder="Введите сообщение"></textarea>

 <br><br>

 <button class="button" onclick="sendBroadcast()">Отправить</button>

 <button class="button secondary" onclick="loadUser()">⬅ Назад</button>

 `

}

async function sendBroadcast(){

 const text=document.getElementById("broadcastText").value

 const res = await fetch("/api/broadcast",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text})
 })

 const data=await res.json()

 alert("Отправлено: "+data.sent)

 loadUser()

}

async function loadReports(){

 const res = await fetch("/api/reports")
 const reports = await res.json()

 const app = document.getElementById("app")

 let html=`<div class="header">📊 Отчёты</div>`

 reports.forEach(r=>{

 html+=`
 <div class="card">

 <b>Код:</b> ${r.code}<br>
 ✅ Успешно: ${r.success}<br>
 ❌ Ошибки: ${r.fail}<br>
 👥 Всего: ${r.total}<br>
 <div class="small">${new Date(r.date).toLocaleString()}</div>

 </div>
 `
 })

 html+=`<button class="button" onclick="loadUser()">⬅ Назад</button>`

 app.innerHTML=html

}

function showCreateSubject(){

 const app=document.getElementById("app")

 app.innerHTML=`

 <div class="header">➕ Новый предмет</div>

 <input id="subjectName" class="input" placeholder="Название предмета">

 <button class="button" onclick="createSubject()">Создать</button>

 <button class="button secondary back" onclick="loadUser()">⬅ Назад</button>

 `

}

async function createSubject(){

 const subject=document.getElementById("subjectName").value

 await fetch("/api/create-subject",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({subject})
 })

 loadSubjects()

}

async function deleteSubject(subject){

 if(!confirm("Удалить "+subject+"?")) return

 await fetch("/api/delete-subject",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({subject})
 })

 loadSubjects()

}

async function showUploadLecture(){

 const res=await fetch("/api/subjects")
 const subjects=await res.json()

 let options=""

 subjects.forEach(s=>{
 options+=`<option value="${s}">${s}</option>`
 })

 const app=document.getElementById("app")

 app.innerHTML=`

 <div class="header">🎤 Загрузка лекции</div>

 <select id="subjectInput" class="select">${options}</select>

 <input type="file" id="audioFile" accept=".ogg">

 <div class="small">Обработка</div>

 <label><input type="radio" name="mode" value="raw" checked> Без AI</label><br>
 <label><input type="radio" name="mode" value="ai"> AI конспект</label>

 <br><br>

 <button class="button" onclick="uploadLecture()">Загрузить</button>

 <button class="button secondary back" onclick="loadUser()">⬅ Назад</button>

 `

}

async function uploadLecture(){

 const subject=document.getElementById("subjectInput").value
 const file=document.getElementById("audioFile").files[0]
 const mode=document.querySelector('input[name="mode"]:checked').value

 const form=new FormData()

 form.append("audio",file)
 form.append("subject",subject)
 form.append("mode",mode)

 await fetch("/api/upload-lecture",{method:"POST",body:form})

 alert("Лекция добавлена")

 loadSubjects()

}

loadUser()

</script>

</body>
</html>
