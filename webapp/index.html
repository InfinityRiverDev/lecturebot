<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>KSTU Lectures</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
 font-family: Arial;
 padding:20px;
 background:#f4f4f4;
}

.card{
 background:white;
 padding:20px;
 border-radius:10px;
 box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="card">

<h2>Mini App KSTU</h2>

<div id="user"></div>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const user = tg.initDataUnsafe?.user

if(!user){

 document.body.innerHTML="Откройте приложение через Telegram"
 throw new Error("No Telegram user")

}

async function loadUser(){

 const response = await fetch("/api/me",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   id:user.id
  })
 })

 const data = await response.json()

 renderApp(data)

}

async function renderApp(data){

 const container = document.getElementById("user")

 if(data.role === "admin"){

  container.innerHTML = `
  <h2>Админ панель</h2>
  <button onclick="loadSubjects()">📚 Список предметов</button>
  `

 }else{

  container.innerHTML = `
  <h2>Лекции</h2>
  <button onclick="loadSubjects()">📚 Открыть предметы</button>
  `

 }

}

async function loadSubjects(){

 const res = await fetch("/api/subjects")
 const subjects = await res.json()

 const container = document.getElementById("user")

 if(subjects.length === 0){
  container.innerHTML = "<p>❌ Пока нет предметов</p>"
  return
 }

 let html = "<h2>📚 Предметы</h2>"

 subjects.forEach(s=>{
  html += `
  <div 
   style="padding:12px;border:1px solid #ddd;margin:6px;border-radius:8px;cursor:pointer"
   onclick="openSubject('${s}')"
  >
   ${s}
  </div>`
 })

 container.innerHTML = html

}

async function openSubject(subject){

 const res = await fetch(`/api/lectures/${subject}`)
 const lectures = await res.json()

 const container = document.getElementById("user")

 if(lectures.length === 0){

  container.innerHTML = `
  <h2>${subject}</h2>
  <p>❌ Пока нет лекций</p>
  <button onclick="loadSubjects()">⬅ Назад</button>
  `
  return
 }

 let html = `<h2>${subject}</h2>`

 lectures.forEach(l=>{

  html += `
  <div 
   style="padding:12px;border:1px solid #ddd;margin:6px;border-radius:8px"
  >
   <a href="/data/${subject}/${l}" target="_blank">
    📄 ${l.replace(".pdf","")}
   </a>
  </div>
  `

 })

 html += `<button onclick="loadSubjects()">⬅ Назад</button>`

 container.innerHTML = html

}

loadUser()

</script>

</body>
</html>
