<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Лекции</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
 font-family:Arial;
 background:#0f172a;
 color:white;
 padding:20px;
}

button{
 padding:10px 20px;
 margin:5px;
 border:none;
 border-radius:8px;
 background:#2563eb;
 color:white;
 cursor:pointer;
}
</style>
</head>

<body>

<h2>📚 Предметы</h2>

<div id="subjects"></div>

<script>

async function loadSubjects(){

 const res = await fetch("/api/subjects")
 const subjects = await res.json()

 const container = document.getElementById("subjects")

 subjects.forEach(subject=>{

  const btn = document.createElement("button")

  btn.innerText = subject

  btn.onclick = ()=>loadLectures(subject)

  container.appendChild(btn)

 })

}

async function loadLectures(subject){

 const res = await fetch("/api/lectures/"+subject)

 const lectures = await res.json()

 const container = document.getElementById("subjects")

 container.innerHTML = "<h2>"+subject+"</h2>"

 lectures.forEach(file=>{

  const btn = document.createElement("button")

  btn.innerText = file.replace(".pdf","")

  btn.onclick = ()=>{

   window.open("/api/lecture/"+subject+"/"+file)

  }

  container.appendChild(btn)

 })

}

loadSubjects()

</script>

</body>
</html>
