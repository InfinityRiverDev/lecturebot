<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Лекции</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>📚 Лекции</h1>
        <div id="subjects"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function loadSubjects() {
            const res = await fetch('/api/subjects');
            const subjects = await res.json();
            
            const container = document.getElementById('subjects');
            container.innerHTML = '';
            
            subjects.forEach(subject => {
                const btn = document.createElement('button');
                btn.className = 'subject-btn';
                btn.textContent = subject;
                btn.onclick = () => loadLectures(subject);
                container.appendChild(btn);
            });
        }

        async function loadLectures(subject) {
            const res = await fetch(`/api/lectures/${subject}`);
            const lectures = await res.json();
            
            const container = document.getElementById('subjects');
            container.innerHTML = `<h2>${subject}</h2><button onclick="loadSubjects()">← Назад</button>`;
            
            lectures.forEach(lecture => {
                const btn = document.createElement('button');
                btn.className = 'lecture-btn';
                btn.textContent = lecture.replace('.pdf', '');
                btn.onclick = () => window.open(`/api/lecture/${subject}/${lecture}`);
                container.appendChild(btn);
            });
        }

        loadSubjects();
    </script>
</body>
</html>
